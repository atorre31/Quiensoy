<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>¿Quién Soy?</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root{--y:#FFD93D;--pk:#FF6B9D;--bl:#4ECDC4;--pu:#C77DFF;--or:#FF8C42;--gr:#6BCB77;--dark:#0d0d1a;--white:#FFFDF7;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.2;}
.b1{width:400px;height:400px;background:var(--pk);top:-100px;left:-100px;animation:bf 9s ease-in-out infinite;}
.b2{width:350px;height:350px;background:var(--bl);bottom:-100px;right:-100px;animation:bf 12s ease-in-out infinite reverse;}
@keyframes bf{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}
.page{position:relative;z-index:1;width:100%;max-width:400px;padding:28px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.s{display:none;flex-direction:column;align-items:center;width:100%;gap:12px;}
.s.on{display:flex;}

/* JOIN */
.j-emoji{font-size:60px;animation:pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes pop{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.j-title{font-family:'Baloo 2',cursive;font-size:42px;font-weight:900;line-height:1.1;}
.j-title em{color:var(--y);font-style:normal;}
.j-sub{color:rgba(255,255,255,0.45);font-size:14px;}
.lbl{font-size:11px;font-weight:700;color:var(--y);letter-spacing:2px;text-transform:uppercase;display:block;text-align:left;width:100%;margin-top:8px;}
.tinput{width:100%;padding:16px 20px;font-family:'Nunito',sans-serif;font-size:20px;font-weight:700;border:3px solid rgba(255,255,255,0.13);border-radius:20px;background:rgba(255,255,255,0.07);color:var(--white);outline:none;text-align:center;-webkit-appearance:none;}
.tinput:focus{border-color:var(--y);}
.tbtn{width:100%;padding:17px;font-family:'Baloo 2',cursive;font-size:21px;font-weight:800;border:none;border-radius:20px;cursor:pointer;background:linear-gradient(135deg,var(--y),var(--or));color:var(--dark);box-shadow:0 8px 28px rgba(255,217,61,0.4);}

/* WAIT */
.wait-emoji{font-size:64px;animation:sway 2.5s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.wait-name{font-family:'Baloo 2',cursive;font-size:30px;font-weight:900;background:linear-gradient(135deg,var(--y),var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.dots{display:inline-flex;gap:7px;margin-top:8px;}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.25);animation:dp 1.4s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{transform:scale(0.8);opacity:0.3}40%{transform:scale(1.2);opacity:1}}

/* GAME */
.game-header{width:100%;display:flex;justify-content:space-between;align-items:center;}
.nbadge{padding:6px 15px;border-radius:50px;background:rgba(255,255,255,0.09);border:2px solid rgba(255,255,255,0.13);font-size:13px;font-weight:700;}
.sbadge{padding:6px 15px;border-radius:50px;background:linear-gradient(135deg,var(--y),var(--or));font-size:13px;font-weight:800;color:var(--dark);}
.qlabel{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;}

/* PUZZLE — pixelation canvas */
.puzzle-wrap{
  position:relative;
  width:240px;height:240px;
  border-radius:16px;overflow:hidden;
  box-shadow:0 16px 50px rgba(0,0,0,0.5);
  border:3px solid rgba(255,255,255,0.1);
}
#puzzle-canvas{width:100%;height:100%;display:block;border-radius:13px;}

.prog{width:240px;height:5px;background:rgba(255,255,255,0.08);border-radius:50px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--bl),var(--pu));border-radius:50px;transition:width 0.5s;}

/* tiles revealed count */
.tiles-count{font-size:12px;color:rgba(255,255,255,0.35);font-weight:700;}

.albl{font-size:11px;font-weight:700;color:var(--bl);letter-spacing:2px;text-transform:uppercase;display:block;text-align:left;width:100%;}
.ainput{width:100%;padding:16px 18px;font-family:'Nunito',sans-serif;font-size:19px;font-weight:700;border:3px solid rgba(255,255,255,0.13);border-radius:18px;background:rgba(255,255,255,0.07);color:var(--white);outline:none;text-align:center;-webkit-appearance:none;transition:border-color 0.2s;}
.ainput:focus{border-color:var(--bl);}
.ainput:disabled{opacity:0.45;}
.abtn{width:100%;padding:15px;font-family:'Baloo 2',cursive;font-size:19px;font-weight:800;border:none;border-radius:18px;cursor:pointer;background:linear-gradient(135deg,var(--bl),var(--pu));color:#fff;box-shadow:0 7px 22px rgba(78,205,196,0.3);}
.abtn:disabled{opacity:0.4;}

/* FEEDBACK */
.fb{width:100%;border-radius:20px;padding:20px;animation:pop 0.35s cubic-bezier(0.175,0.885,0.32,1.275);}
.fb.ok{background:rgba(107,203,119,0.14);border:2px solid var(--gr);}
.fb.no{background:rgba(255,82,82,0.11);border:2px solid rgba(255,82,82,0.4);}
.fb-emoji{font-size:44px;}
.fb-title{font-family:'Baloo 2',cursive;font-size:22px;font-weight:900;margin-top:4px;}
.fb-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-top:3px;}
.fb-pts{font-family:'Baloo 2',cursive;font-size:30px;font-weight:900;color:var(--y);margin-top:4px;}

/* REVEAL */
.rev-card{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:24px;}
.rev-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.rev-answer{font-family:'Baloo 2',cursive;font-size:34px;font-weight:900;background:linear-gradient(135deg,var(--y),var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.rev-status{margin-top:10px;font-size:17px;font-weight:700;}

/* FINISHED */
.fin-score{font-family:'Baloo 2',cursive;font-size:72px;font-weight:900;background:linear-gradient(135deg,var(--y),var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.lb-mini{width:100%;display:flex;flex-direction:column;gap:7px;}
.lbr{display:grid;grid-template-columns:26px 1fr auto;align-items:center;gap:8px;padding:9px 12px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);}
.lbr.me{background:rgba(255,217,61,0.1);border-color:rgba(255,217,61,0.35);}

canvas#conf{position:fixed;inset:0;z-index:999;pointer-events:none;}
</style>
</head>
<body>
<canvas id="conf"></canvas>
<div class="bg"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="page">

  <!-- JOIN -->
  <div class="s on" id="s-join">
    <div class="j-emoji">🎉</div>
    <div class="j-title">¿<em>Quién</em><br>Soy?</div>
    <div class="j-sub">Día del Niño · ¡Adivina a tu compañero!</div>
    <label class="lbl">Tu nombre</label>
    <input class="tinput" id="name-in" type="text" placeholder="Escríbelo aquí..." maxlength="22" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="tbtn" onclick="joinGame()">¡Unirme! 🚀</button>
  </div>

  <!-- WAIT -->
  <div class="s" id="s-wait">
    <div class="wait-emoji">⏳</div>
    <div style="font-family:'Baloo 2',cursive;font-size:20px;font-weight:900;">¡Listo,</div>
    <div class="wait-name" id="wait-name">Jugador</div>
    <div style="font-family:'Baloo 2',cursive;font-size:20px;font-weight:900;">!</div>
    <div style="color:rgba(255,255,255,0.4);font-size:14px;">Esperando que el anfitrión empiece</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>

  <!-- GAME -->
  <div class="s" id="s-game">
    <div class="game-header">
      <div class="nbadge" id="g-name">Tú</div>
      <div class="sbadge">⭐ <span id="g-score">0</span></div>
    </div>
    <div class="qlabel" id="g-qlabel">PREGUNTA 1 DE ?</div>

    <!-- Puzzle canvas -->
    <div class="puzzle-wrap">
      <canvas id="puzzle-canvas" width="240" height="240"></canvas>
    </div>
    <div class="tiles-count" id="tiles-count">0 de 9 piezas reveladas</div>
    <div class="prog"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

    <div id="ans-section">
      <label class="albl" style="margin-bottom:7px;">¿Quién es?</label>
      <input class="ainput" id="ans-in" type="text" placeholder="Escribe el nombre..." maxlength="50" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="abtn" id="ans-btn" onclick="submitAnswer()" style="margin-top:10px;">¡Enviar! ✉️</button>
    </div>
    <div class="fb" id="fb" style="display:none;">
      <div class="fb-emoji" id="fb-emoji">🎉</div>
      <div class="fb-title" id="fb-title">¡Correcto!</div>
      <div class="fb-sub" id="fb-sub"></div>
      <div class="fb-pts" id="fb-pts"></div>
    </div>
  </div>

  <!-- REVEAL -->
  <div class="s" id="s-reveal">
    <div class="rev-card">
      <div class="rev-lbl">¡Era...</div>
      <div class="rev-answer" id="r-answer">?</div>
      <div class="rev-status" id="r-status"></div>
    </div>
    <div style="color:rgba(255,255,255,0.35);font-size:13px;">Esperando la siguiente pregunta...</div>
  </div>

  <!-- FINISHED -->
  <div class="s" id="s-fin">
    <div style="font-size:70px;">🏆</div>
    <div style="font-family:'Baloo 2',cursive;font-size:28px;font-weight:900;" id="fin-title">¡Fin!</div>
    <div class="fin-score" id="fin-score">0</div>
    <div style="color:rgba(255,255,255,0.4);font-size:14px;">puntos totales</div>
    <div style="font-size:17px;font-weight:700;margin-top:4px;" id="fin-rank"></div>
    <div class="lb-mini" id="lb-mini"></div>
  </div>

</div>

<script>
const BASE = window.location.origin;
let myName='',myScore=0,answered=false,lastQ=-1,lastResult=null,pollTimer=null;

function joinGame(){
  const input=document.getElementById('name-in');
  const name=input.value.trim();
  if(!name){input.style.borderColor='#ff5252';input.focus();setTimeout(()=>input.style.borderColor='',1500);return;}
  myName=name;
  document.getElementById('wait-name').textContent=name;
  document.getElementById('g-name').textContent=name.length>12?name.slice(0,12)+'…':name;
  fetch(BASE+'/api/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})})
    .then(r=>r.json()).then(d=>{if(d.ok){showS('wait');startPolling();}})
    .catch(()=>{input.style.borderColor='#ff5252';input.placeholder='Error, reintenta...';});
}

function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(poll,1000);poll();
}

async function poll(){
  try{
    const r=await fetch(`${BASE}/api/state?player=${encodeURIComponent(myName)}&t=${Date.now()}`);
    const data=await r.json();
    handleState(data);
  }catch(e){}
}

function handleState(data){
  const{phase,currentQ,totalQ,revealedTiles,players,myAnswer,questionAnswer}=data;
  const me=players.find(p=>p.name===myName);
  if(me){myScore=me.score;document.getElementById('g-score').textContent=myScore;}

  if(currentQ!==lastQ){
    lastQ=currentQ;answered=false;lastResult=null;resetAnswerUI();
  }

  if(phase==='lobby'){showS('wait');return;}

  if(phase==='question'){
    showS('game');
    document.getElementById('g-qlabel').textContent=`PREGUNTA ${currentQ+1} DE ${totalQ}`;
    renderPuzzle(revealedTiles||[]);
    const n=(revealedTiles||[]).length;
    document.getElementById('tiles-count').textContent=`${n} de 9 piezas reveladas`;
    document.getElementById('prog-fill').style.width=`${(n/9)*100}%`;
    if(myAnswer&&!lastResult){lastResult=myAnswer;showFeedback(myAnswer);}
  }

  if(phase==='reveal'){
    renderPuzzle(Array.from({length:9},(_,i)=>i));
    document.getElementById('r-answer').textContent=questionAnswer||'?';
    const ok=lastResult?.correct||myAnswer?.correct;
    document.getElementById('r-status').innerHTML=ok
      ?'<span style="color:var(--gr)">✅ ¡Lo acertaste!</span>'
      :answered||myAnswer?'<span style="color:#ff7070">❌ No fue correcto</span>'
      :'<span style="color:rgba(255,255,255,0.35)">No respondiste</span>';
    showS('reveal');
  }

  if(phase==='finished'){showFinished(players);}
}

// Fetch current image from host state to get dataUrl for puzzle
let currentImgUrl = '';
async function fetchCurrentImg(q){
  try{
    const r = await fetch(`${BASE}/api/img?q=${q}&t=${Date.now()}`);
    if(r.ok){
      const d = await r.json();
      currentImgUrl = d.dataUrl || '';
      if(currentImgUrl){
        pImg = new Image();
        pPixelCurrent = P_MAX;
        pImg.onload = () => renderPuzzle(pRevealed);
        pImg.src = currentImgUrl;
      }
    }
  }catch(e){}
}

// ── Puzzle pixelation engine (player) ─────────────────────
let pImg = new Image();
let pRevealed = [];
let pPixelCurrent = 40;
let pAnimFrame = null;
const P_MAX = 40, P_MIN = 2;

function renderPuzzle(revealed){
  pRevealed = [...revealed];
  const pct = revealed.length / 9;
  const target = P_MAX - pct * (P_MAX - P_MIN);
  if(pAnimFrame) cancelAnimationFrame(pAnimFrame);
  function step(){
    const diff = target - pPixelCurrent;
    if(Math.abs(diff) < 0.3){ pPixelCurrent=target; drawPuzzle(pPixelCurrent); return; }
    pPixelCurrent += diff * 0.12;
    drawPuzzle(pPixelCurrent);
    pAnimFrame = requestAnimationFrame(step);
  }
  step();
}

function drawPuzzle(blockSize){
  const canvas = document.getElementById('puzzle-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  if(!pImg.complete || !pImg.naturalWidth){
    ctx.fillStyle='#16162a';
    ctx.fillRect(0,0,W,H);
    return;
  }

  const bs = Math.max(1, Math.round(blockSize));
  if(bs <= 1){
    ctx.drawImage(pImg, 0, 0, W, H);
  } else {
    const off = document.createElement('canvas');
    off.width  = Math.max(1, Math.round(W/bs));
    off.height = Math.max(1, Math.round(H/bs));
    const oCtx = off.getContext('2d');
    oCtx.imageSmoothingEnabled = false;
    oCtx.drawImage(pImg, 0, 0, off.width, off.height);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, 0, 0, W, H);
  }

  // Grid lines
  const cW=W/3, cH=H/3;
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1.5;
  for(let i=1;i<3;i++){
    ctx.beginPath();ctx.moveTo(i*cW,0);ctx.lineTo(i*cW,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*cH);ctx.lineTo(W,i*cH);ctx.stroke();
  }

  // Dark overlay on unrevealed tiles
  for(let i=0;i<9;i++){
    if(!pRevealed.includes(i)){
      const col=i%3, row=Math.floor(i/3);
      ctx.fillStyle='rgba(8,8,20,0.72)';
      ctx.fillRect(col*cW+1, row*cH+1, cW-2, cH-2);
    }
  }
}

function submitAnswer(){
  if(answered)return;
  const text=document.getElementById('ans-in').value.trim();
  if(!text)return;
  answered=true;
  document.getElementById('ans-in').disabled=true;
  document.getElementById('ans-btn').disabled=true;
  document.getElementById('ans-btn').textContent='⏳ Enviado...';
  fetch(BASE+'/api/answer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:myName,text})})
    .then(r=>r.json()).then(d=>{if(d.ok){lastResult=d;showFeedback(d);}})
    .catch(()=>{document.getElementById('ans-btn').disabled=false;document.getElementById('ans-btn').textContent='¡Enviar! ✉️';answered=false;});
}

function showFeedback(result){
  document.getElementById('ans-section').style.display='none';
  const fb=document.getElementById('fb');fb.style.display='block';
  fb.className=`fb ${result.correct?'ok':'no'}`;
  const medals=['🥇','🥈','🥉'];
  const okE=['🎉','🌟','✨','🔥','👏'],noE=['😅','😬','😊'];

  if(result.correct){
    const order = result.order;
    const medal = order && order<=3 ? medals[order-1] : '✅';
    const orderText = order===1?'¡Primero en acertar! 🚀':order===2?'¡Segundo lugar! ⚡':order===3?'¡Tercer lugar! 🎯':'¡Lo acertaste!';
    document.getElementById('fb-emoji').textContent=medal;
    document.getElementById('fb-title').textContent=orderText;
    document.getElementById('fb-sub').textContent=`en ${result.time?result.time.toFixed(1):'?'}s`;
    document.getElementById('fb-pts').textContent=`+${result.pts} pts`;
    launchConfetti(order===1?35:18);
  } else {
    document.getElementById('fb-emoji').textContent=noE[Math.floor(Math.random()*noE.length)];
    document.getElementById('fb-title').textContent='No fue correcto';
    document.getElementById('fb-sub').textContent=`Era: ${result.answer||''}`;
    document.getElementById('fb-pts').textContent='';
  }
}

function resetAnswerUI(){
  document.getElementById('ans-section').style.display='block';
  document.getElementById('ans-in').value='';
  document.getElementById('ans-in').disabled=false;
  document.getElementById('ans-btn').disabled=false;
  document.getElementById('ans-btn').textContent='¡Enviar! ✉️';
  document.getElementById('fb').style.display='none';
  currentImgUrl='';
  pImg = new Image();
  pPixelCurrent = P_MAX;
  drawPuzzle(P_MAX);
  if(lastQ>=0) fetchCurrentImg(lastQ);
}

function showFinished(players){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  const medals=['🥇','🥈','🥉'];
  const rank=players.findIndex(p=>p.name===myName)+1;
  const me=players.find(p=>p.name===myName);
  document.getElementById('fin-title').textContent=myName;
  document.getElementById('fin-score').textContent=me?me.score:myScore;
  document.getElementById('fin-rank').textContent=rank<=3?`${medals[rank-1]} ¡Puesto ${rank} de ${players.length}!`:`Puesto ${rank} de ${players.length}`;
  document.getElementById('lb-mini').innerHTML=players.slice(0,8).map((p,i)=>`
    <div class="lbr ${p.name===myName?'me':''}">
      <span style="font-family:'Baloo 2',cursive;font-size:14px;font-weight:900;color:rgba(255,255,255,0.3)">${medals[i]||i+1}</span>
      <span style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}${p.name===myName?' (tú)':''}</span>
      <span style="font-family:'Baloo 2',cursive;font-size:16px;font-weight:900;color:var(--y)">${p.score}</span>
    </div>`).join('');
  showS('fin');
  if(rank===1)launchConfetti(60);
}

function showS(name){['join','wait','game','reveal','fin'].forEach(s=>document.getElementById(`s-${s}`).classList.toggle('on',s===name));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function launchConfetti(n){
  const c=document.getElementById('conf'),ctx=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const cols=['#FFD93D','#FF6B9D','#4ECDC4','#C77DFF','#FF8C42','#6BCB77'];
  const ps=Array.from({length:n*3},()=>({x:Math.random()*c.width,y:-10,s:Math.random()*8+4,col:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-0.5)*4,vy:Math.random()*4+2,r:Math.random()*360,vr:(Math.random()-0.5)*9}));
  let fr;(function anim(){ctx.clearRect(0,0,c.width,c.height);let alive=false;ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.09;p.r+=p.vr;if(p.y<c.height+10)alive=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.col;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.55);ctx.restore();});if(alive)fr=requestAnimationFrame(anim);else ctx.clearRect(0,0,c.width,c.height);})();
}

document.getElementById('name-in').addEventListener('keydown',e=>{if(e.key==='Enter')joinGame();});
document.getElementById('ans-in').addEventListener('keydown',e=>{if(e.key==='Enter')submitAnswer();});
</script>
</body>
</html>
